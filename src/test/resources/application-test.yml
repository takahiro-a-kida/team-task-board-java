spring:
  datasource:
    url: jdbc:sqlite:file:taskboard-test?mode=memory&cache=shared
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      pool-name: taskboard-test-pool

taskboard:
  seed:
    enabled: false

logging:
  level:
    root: WARN
    com.example.taskboard: INFO
    org.springframework.jdbc: WARN
